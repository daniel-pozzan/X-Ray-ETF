<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Ray ETF Explorer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blob"></div>
    <div class="background-blob blob-2"></div>
    
    <div class="container">
        <header>
            <h1><span class="gradient-text">X-Ray</span> ETF</h1>
            <p>Discover the exhaustive composition behind any ETF</p>
        </header>

        <div class="search-container glass-panel">
            <input type="text" id="isin-input" placeholder="Enter ISIN (e.g. IE00B4L5Y983)" autocomplete="off" />
            <button id="search-btn">Analyze</button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Scanning markets...</p>
        </div>

        <div id="error-message" class="hidden"></div>

        <div id="results-container" class="hidden glass-panel">
            <div class="results-header">
                <h2 id="etf-title">Composition</h2>
                <div class="stats" id="etf-stats"></div>
            </div>
            
            <div class="table-container">
                <table id="holdings-table">
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Name</th>
                            <th>Sector</th>
                            <th class="right-align">Weight (%)</th>
                            <th>Bar</th>
                        </tr>
                    </thead>
                    <tbody id="holdings-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="/static/app.js"></script>
</body>
</html>
