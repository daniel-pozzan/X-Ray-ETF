<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF Not Found</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blob"></div>
    <div class="background-blob blob-2"></div>
    
    <div class="container">
        <header>
            <h1><span class="gradient-text">X-Ray</span> ETF</h1>
        </header>

        <div class="glass-panel" style="text-align: center; padding: 3rem;">
            <h2 style="font-size: 2rem; color: #ff6b6b; margin-bottom: 1rem;">ETF Not Found</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6;">
                The ISIN you entered doesn't match a supported ETF (currently only iShares are supported) or the provider's page could not be located.
            </p>
            <a href="/" style="display: inline-block; padding: 0.8rem 1.5rem; background: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: opacity 0.2s;">
                Return to Search
            </a>
        </div>
    </div>
</body>
</html>
